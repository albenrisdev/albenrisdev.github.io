<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Lumina Chronos — Pomodoro timer for Android & iOS</title>
    <meta name="description" content="A focused Pomodoro timer with color-band cues, offline by design. Available on Android and iOS." />
    <style>
        :root {
            color-scheme: dark;
            --bg: #111316;
            --fg: #e7e9ec;
            --muted: #9aa0a6;
            --accent: #6cc070;
            --accent-soft: rgba(108, 192, 112, 0.12);
            --card: #181b1f;
            --border: #2a2d31;
        }
        * { box-sizing: border-box; }
        html, body {
            margin: 0;
            padding: 0;
            background: var(--bg);
            color: var(--fg);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            line-height: 1.55;
        }
        main {
            max-width: 720px;
            margin: 0 auto;
            padding: 4rem 1.5rem 6rem;
        }
        h1 {
            font-size: 2.5rem;
            margin: 0 0 0.5rem;
            letter-spacing: -0.02em;
        }
        .tagline {
            font-size: 1.15rem;
            color: var(--muted);
            margin: 0 0 2.5rem;
        }
        .platforms {
            display: grid;
            grid-template-columns: 1fr;
            gap: 1rem;
            margin: 2rem 0;
        }
        @media (min-width: 560px) {
            .platforms { grid-template-columns: 1fr 1fr; }
        }
        .platform {
            display: block;
            padding: 1.5rem;
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 14px;
            color: var(--fg);
            text-decoration: none;
            transition: border-color 0.15s ease, transform 0.15s ease;
        }
        .platform:hover {
            border-color: var(--accent);
            transform: translateY(-2px);
        }
        .platform h2 {
            margin: 0 0 0.25rem;
            font-size: 1.25rem;
            color: var(--accent);
        }
        .platform p {
            margin: 0;
            color: var(--muted);
            font-size: 0.95rem;
        }
        footer {
            margin-top: 4rem;
            padding-top: 1.5rem;
            border-top: 1px solid var(--border);
            color: var(--muted);
            font-size: 0.9rem;
        }
        a { color: var(--accent); }
    </style>
</head>
<body>
<main>
    <h1>Lumina Chronos</h1>
    <p class="tagline">A focused Pomodoro timer. Color-band progress ring, built-in focus quotes, offline by design — no accounts, no network, no tracking.</p>

    <div class="platforms">
        <a class="platform" href="ios/">
            <h2>iOS &rarr;</h2>
            <p>iPhone &amp; iPad. iOS 17 or newer.</p>
        </a>
        <a class="platform" href="android/">
            <h2>Android &rarr;</h2>
            <p>Phone. Android 8.0 (API 26) or newer.</p>
        </a>
    </div>

    <footer>
        &copy; 2026 Alben Risdev · <a href="https://github.com/albenrisdev">GitHub</a>
    </footer>
</main>
</body>
</html>
